<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gruppy</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome Back to Gruppy</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-btn">
                    <span class="btn-text">Log In</span>
                    <span class="btn-loader"></span>
                </button>
            </form>
            <div id="message" class="message"></div>
            <p class="auth-switch">Don't have an account? <a href="/signup.html">Sign Up</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loginButton = this.querySelector('.auth-btn');

            loginButton.classList.add('loading');
            
            try {
                // *** FIX: Using correct absolute URL to connect to the running server ***
                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('gruppyAuthToken', data.token);
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.className = 'message success';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.textContent = data.error || 'Invalid credentials';
                    messageDiv.className = 'message error';
                    loginButton.classList.remove('loading');
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                messageDiv.textContent = 'Could not connect to the server. Please ensure it is running and accessible.';
                messageDiv.className = 'message error';
                loginButton.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
