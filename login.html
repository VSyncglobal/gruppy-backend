<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In to Gruppy</title>
    <link rel="stylesheet" href="auth-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-form-wrapper">
            <a href="index.html" class="logo">Gruppy</a>
            <div class="auth-form">
                <h1 class="auth-title">Welcome Back!</h1>
                <p class="auth-subtitle">Log in to continue your shipping journey.</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-options">
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                </form>

                <!-- Message area for feedback -->
                <p id="feedback-message" class="feedback"></p>

                <div class="auth-switch">
                    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const feedbackMessage = document.getElementById('feedback-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            feedbackMessage.textContent = ''; // Clear previous messages
            
            const email = loginForm.email.value;
            const password = loginForm.password.value;

            try {
                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed.');
                }

                // --- Handle Success ---
                // UPDATED: Save the token to localStorage
                localStorage.setItem('gruppyAuthToken', data.token);

                feedbackMessage.textContent = 'Login successful! Redirecting...';
                feedbackMessage.style.color = 'var(--accent-color)';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                // Handle failure
                feedbackMessage.textContent = error.message;
                feedbackMessage.style.color = 'var(--error-color)';
            }
        });
    </script>

</body>
</html>
